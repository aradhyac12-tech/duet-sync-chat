<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- iOS PWA / Status bar -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Theme color matches app background -->
    <meta name="theme-color" content="#F5F0EB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A2E" media="(prefers-color-scheme: dark)" />

    <!-- Prevent phone number detection -->
    <meta name="format-detection" content="telephone=no" />

    <title>DuoSpace</title>
    <meta name="description" content="A private space for two" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- NAME-03 FIX: PWA manifest so the installed app has a name and is installable.
         Previously there was no manifest at all — the PWA install name was frozen to
         whatever the browser inferred from <title>, with no icon or display config. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="DuoSpace" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
