name: CI Security & Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  deps-vulns:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install
        run: bun install --frozen-lockfile
      - name: Audit (high+critical)
        # Fails the build only when high/critical vulnerabilities are present
        run: |
          bunx --bun npm audit --audit-level=high --omit=dev || EXIT=$?
          if [ "${EXIT:-0}" -ne 0 ]; then
            echo "::error::High or critical vulnerabilities found in production dependencies"
            exit 1
          fi

  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .github/gitleaks.toml

  typecheck-tests:
    name: Typecheck + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bunx vitest run

  rls-coverage:
    name: Supabase RLS policy coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Verify every public table has RLS + policies
        run: bun run scripts/check-rls-coverage.ts
